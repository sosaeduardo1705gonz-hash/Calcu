<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Tecmilenio</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <!-- Logo TecMilenio -->
  <img src="https://images.credly.com/size/400x400/images/b8e6d134-79fe-4f11-a50c-309463334760/blob.png"
alt="Logo TecMilenio" width="200">

  <h1>Calculadora Aritmética, Binaria y Lógica</h1>

  <!-- Aritmética -->
  <h2>Aritmética</h2>
  <input type="number" id="num1">
  <select id="opArit">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
  </select>
  <input type="number" id="num2">
  <button onclick="calcularAritmetica()">Calcular</button>

  <!-- Binaria -->
  <h2>Binaria</h2>
  <input type="text" id="bin1" placeholder="Ej: 1010">
  <select id="opBin">
    <option value="AND">AND</option>
    <option value="OR">OR</option>
    <option value="XOR">XOR</option>
  </select>
  <input type="text" id="bin2" placeholder="Ej: 1100">
  <button onclick="calcularBinaria()">Calcular</button>

  <!-- Lógica -->
  <h2>Lógica</h2>
  <select id="log1">
    <option value="true">True</option>
    <option value="false">False</option>
  </select>
  <select id="opLog">
    <option value="AND">AND</option>
    <option value="OR">OR</option>
    <option value="NOT">NOT</option>
  </select>
  <select id="log2">
    <option value="true">True</option>
    <option value="false">False</option>
  </select>
  <button onclick="calcularLogica()">Calcular</button>

  <!-- Resultado -->
  <h2>Resultado</h2>
  <p id="resultado"></p>

  <script>
    function calcularAritmetica() {
      let n1 = parseFloat(document.getElementById("num1").value);
      let n2 = parseFloat(document.getElementById("num2").value);
      let op = document.getElementById("opArit").value;
      let res;
      if(op === "+") res = n1 + n2;
      else if(op === "-") res = n1 - n2;
      else if(op === "*") res = n1 * n2;
      else if(op === "/") res = n1 / n2;
      document.getElementById("resultado").innerText = res;
    }

    function calcularBinaria() {
      let b1 = parseInt(document.getElementById("bin1").value, 2);
      let b2 = parseInt(document.getElementById("bin2").value, 2);
      let op = document.getElementById("opBin").value;
      let res;
      if(op === "AND") res = b1 & b2;
      else if(op === "OR") res = b1 | b2;
      else if(op === "XOR") res = b1 ^ b2;
      document.getElementById("resultado").innerText = res.toString(2);
    }

    function calcularLogica() {
      let l1 = document.getElementById("log1").value === "true";
      let l2 = document.getElementById("log2").value === "true";
      let op = document.getElementById("opLog").value;
      let res;
      if(op === "AND") res = l1 && l2;
      else if(op === "OR") res = l1 || l2;
      else if(op === "NOT") res = !l1; // NOT solo aplica al primero
      document.getElementById("resultado").innerText = res;
    }
  </script>
</body>
</html>
